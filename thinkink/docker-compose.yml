services:
  # Minimal backend + Mongo to learn the basics
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: thinkink-backend
    # Load environment variables from backend/.env file
    # This will use your existing MONGO_URI, JWT_SECRET, CLOUDINARY, REDIS_URL, etc.
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      # REDIS_URL from .env is used as-is (Upstash/Redis Cloud). No Redis container needed.
    ports:
      - "5000:5000"
    # Remove depends_on if not using Docker MongoDB (OPTION 4)
    # depends_on:
    #   - mongo

    logging:                          # ← ADD THIS
      driver: awslogs                 # send logs to CloudWatch
      options:
        awslogs-region: ap-south-1    # Mumbai region
        awslogs-group: thinkink-logs  # log group name
        awslogs-stream: backend       # stream name

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: thinkink-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

# Send Frontend logs to Cloudwatch
    logging:                         
      driver: awslogs
      options:
        awslogs-region: ap-south-1
        awslogs-group: thinkink-logs
        awslogs-stream: frontend

  # MongoDB service - COMMENTED OUT (using external MongoDB)
  # mongo:
  #   image: mongo:6
  #   container_name: thinkink-mongo
  #   volumes:
  #     - mongo_data:/data/db
  #   ports:
  #     - "27017:27017"

  # Redis - OPTIONAL: only if you want Redis inside Docker (e.g. local dev without Upstash).
  # If using Upstash/Redis Cloud, leave this commented and set REDIS_URL in .env.
  # redis:
  #   image: redis:7-alpine
  #   container_name: thinkink-redis
  #   ports:
  #     - "6379:6379"
  # Then in backend environment, set: REDIS_URL=redis://redis:6379
  # (or pass via .env when using local Redis; override REDIS_URL for Docker)

